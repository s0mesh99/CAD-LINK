name: CAD LINK Daily Scraper

on:
  schedule:
    # Runs at 00:00 UTC and 12:00 UTC every day
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # We need permissions to push the DB back to the repo
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install free-proxy

    - name: Run Scrapers
      run: |
        python run.py --run-scrapers
      env:
        BING_API_KEY: ${{ secrets.BING_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push updated database
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add cadlink.db
        git commit -m "Auto-update database with new leads" || echo "No changes to commit"
        git push
