name: CAD LINK Daily Scraper

on:
  schedule:
    # Runs at 00:00 UTC and 12:00 UTC Monday through Friday
    - cron: '0 0,12 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # We need permissions to push the DB back to the repo
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright
        playwright install chromium --with-deps

    - name: Run Scrapers and Enrichment
      run: |
        python run.py --run-scrapers
        python run.py --run-enrichment
        python run.py --send-emails
      env:
        BING_API_KEY: ${{ secrets.BING_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
        ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
