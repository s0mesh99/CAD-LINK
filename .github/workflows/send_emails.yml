name: CAD LINK Email Engine

on:
  schedule:
    # Runs at 06:00 UTC (10:00 AM Gulf Standard Time / 11:30 AM India Time) Monday through Friday ONLY
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  send_emails:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Email Engine
      run: |
        python run.py --send-emails
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
        ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
