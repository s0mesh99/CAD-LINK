name: CAD LINK Daily Scraper & Enrichment

on:
  schedule:
    # Aggressive schedule: Runs every 2 hours to maximize lead volume before Monday
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright duckduckgo-search
        playwright install chromium --with-deps

    - name: Run Scrapers and Enrichment
      run: |
        python run.py --run-scrapers
        python run.py --run-enrichment
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
