name: V1.6 Automation Engine

on:
  schedule:
    # Run once per day at 8:00 AM UTC (safely stays under the 20 requests/day Free Tier limit)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          # Install Python packages
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # Install Playwright Headless Browser Engine
          playwright install --with-deps chromium
          

        
      - name: Run Deep AI Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py --run-deep-enrichment
        
      - name: Run Campaign Blaster
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py --run-blaster
